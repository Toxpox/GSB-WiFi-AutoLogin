name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  build:
    needs: check
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build
        working-directory: src-tauri
        run: cargo tauri build
      - name: Prepare release files
        shell: bash
        run: |
          cp "src-tauri/target/release/gsb-wifi-autologin.exe" "GSB_WiFi_AutoLogin_portable.exe"
          cp src-tauri/target/release/bundle/nsis/*.exe "GSB_WiFi_AutoLogin_setup.exe" 2>/dev/null || true
          certutil -hashfile "GSB_WiFi_AutoLogin_portable.exe" SHA256 > SHA256SUMS.txt
          certutil -hashfile "GSB_WiFi_AutoLogin_setup.exe" SHA256 >> SHA256SUMS.txt 2>/dev/null || true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GSB_WiFi_AutoLogin_portable.exe
            GSB_WiFi_AutoLogin_setup.exe
            SHA256SUMS.txt
