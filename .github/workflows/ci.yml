name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --locked -- -D warnings

      - name: Frontend syntax check
        shell: pwsh
        run: |
          node --check frontend/js/app.js
          node --check frontend/js/giris.js
          node --check frontend/js/log.js
          node --check frontend/js/hosgeldin.js

      - name: Version consistency
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $cargoToml = Get-Content -Raw -Encoding UTF8 src-tauri/Cargo.toml
          if ($cargoToml -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw "src-tauri/Cargo.toml version bulunamadi."
          }
          $version = $Matches[1]

          $tauriConf = Get-Content -Raw -Encoding UTF8 src-tauri/tauri.conf.json | ConvertFrom-Json
          if ($tauriConf.version -ne $version) {
            throw "tauri.conf.json version ($($tauriConf.version)) Cargo.toml version ($version) ile uyusmuyor."
          }

          $configRs = Get-Content -Raw -Encoding UTF8 src-tauri/src/config.rs
          $versionLine = 'pub const VERSION: &str = "' + $version + '";'
          if ($configRs -notmatch [regex]::Escape($versionLine)) {
            throw "config.rs VERSION sabiti $version ile uyusmuyor."
          }

          $frontendApp = Get-Content -Raw -Encoding UTF8 frontend/js/app.js
          $frontendVersionLine = 'let VERSION = "' + $version + '";'
          if ($frontendApp -notmatch [regex]::Escape($frontendVersionLine)) {
            throw "frontend/js/app.js VERSION fallback degeri $version ile uyusmuyor."
          }

          $cargoLock = Get-Content -Raw -Encoding UTF8 src-tauri/Cargo.lock
          $lockPattern = '(?ms)\[\[package\]\]\s+name = "gsb-wifi-autologin"\s+version = "' + [regex]::Escape($version) + '"'
          if ($cargoLock -notmatch $lockPattern) {
            throw "Cargo.lock proje paketi versiyonu $version ile uyusmuyor."
          }

          $readme = Get-Content -Raw -Encoding UTF8 README.md
          if ($readme -notmatch [regex]::Escape("version-$version-blue")) {
            throw "README.md version rozeti $version ile uyusmuyor."
          }

          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
            if ($tag -ne "v$version") {
              throw "Git tag ($tag) proje versiyonu (v$version) ile uyusmuyor."
            }
          }

  build:
    needs: check
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        working-directory: src-tauri
        run: cargo tauri build

      - name: Prepare release files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $portableSource = "src-tauri/target/release/gsb-wifi-autologin.exe"
          $installerSource = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1

          if (!(Test-Path $portableSource)) {
            throw "Portable exe bulunamadi: $portableSource"
          }
          if ($null -eq $installerSource) {
            throw "NSIS installer bulunamadi."
          }

          Copy-Item $portableSource "GSB_WiFi_AutoLogin_portable.exe"
          Copy-Item $installerSource.FullName "GSB_WiFi_AutoLogin_setup.exe"

          $files = @(
            "GSB_WiFi_AutoLogin_portable.exe",
            "GSB_WiFi_AutoLogin_setup.exe"
          )

          $hashLines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file).Hash
            "$hash  $file"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $hashLines -Encoding ASCII

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GSB_WiFi_AutoLogin_portable.exe
            GSB_WiFi_AutoLogin_setup.exe
            SHA256SUMS.txt
